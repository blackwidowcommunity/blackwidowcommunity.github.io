<style>
  /* NAVBAR FONT SIZE AND HEIGHT - EXACTLY matching AboutUs.html */
    .navbar {
      justify-content: center !important;
      padding: 2.6rem 5% !important;
      gap: 2rem !important;
    }
    .navbar .logo-btn { display: none !important; }
    .nav-links li a {
      font-size: 1.27rem !important;
      font-weight: 600 !important;
    }
    .hamburger {
      position: absolute !important;
      right: 5% !important;
      top: 50% !important;
      transform: translateY(-50%) !important;
      font-size: 2.4rem !important;
    }
    @media (max-width: 768px) {
      .navbar { padding: 2.2rem 5% !important; }
    }

    /* ===== HAMBURGER SIDE MENU FONT SIZE - SLIGHTLY DECREASED ===== */
    /* This targets the mobile navigation menu when it becomes active/side menu */
    @media (max-width: 768px) {
      .sidebar a,
      .nav-links.active li a,
      .nav-links.show li a,
      .sidebar ul li a {
        font-size: 1.75rem !important; /* Slightly decreased from 1.9rem to 1.75rem */
        padding: 0.8rem 0 !important;
      }
    }
</style>

<header>
  <nav class="navbar glass">
    <ul class="nav-links">
      <li><a href="index.html" data-page="index">Home</a></li>
      <li><a href="AboutUs.html" data-page="AboutUs">About Us</a></li>
      <li><a href="projects.html" data-page="projects">Projects</a></li>
      <li><a href="guests.html" data-page="guests">Guests</a></li>
      <li><a href="shop.html" data-page="shop">Shop</a></li>
      <li><a href="contact.html" data-page="contact">Contact Us</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <i class="fa fa-bars"></i>
    </button>
  </nav>
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html" data-page="index">Home</a></li>
      <li><a href="AboutUs.html" data-page="AboutUs">About Us</a></li>
      <li><a href="projects.html" data-page="projects">Projects</a></li>
      <li><a href="guests.html" data-page="guests">Guests</a></li>
      <li><a href="shop.html" data-page="shop">Shop</a></li>
      <li><a href="contact.html" data-page="contact">Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
</header>

<script>
  // Navigation bar interaction script
  (function() {
    function initNavbar() {
      const hamburger = document.getElementById('hamburger');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const menuSound = new Audio('menu.mp3');
      const navSound = new Audio('nav.mp3');
      
      if (hamburger && sidebar && overlay) {
        hamburger.addEventListener('click', () => { 
          sidebar.classList.toggle('active'); 
          overlay.classList.toggle('active'); 
          menuSound.currentTime = 0; 
          menuSound.play().catch(() => {}); 
        });
        
        overlay.addEventListener('click', () => { 
          sidebar.classList.remove('active'); 
          overlay.classList.remove('active'); 
        });
      }
      
      // Set active class based on current page
      const currentPage = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-links a, .sidebar a').forEach(link => {
        const linkPage = link.getAttribute('href');
        if (linkPage === currentPage) {
          link.classList.add('active');
        }
        
        link.addEventListener('click', (e) => { 
          e.preventDefault(); 
          navSound.currentTime = 0; 
          navSound.play().catch(() => {}); 
          setTimeout(() => { 
            window.location.href = link.getAttribute('href'); 
          }, 150); 
        }); 
      });
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initNavbar);
    } else {
      initNavbar();
    }
  })();
</script>
