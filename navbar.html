<style>
  /* NAVBAR FONT SIZE AND HEIGHT - EXACTLY matching AboutUs.html */
  .navbar {
    justify-content: center !important;
    padding: 2.6rem 5% !important;
    gap: 2rem !important;
    position: relative;
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 50px;
    margin: 1.5rem 5% 0;
    z-index: 100;
  }
  
  .nav-links {
    display: flex;
    gap: 3rem;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  
  .nav-links li a {
    font-size: 1.27rem !important;
    font-weight: 600 !important;
    font-family: 'Raleway', sans-serif;
    color: #f5f0eb;
    text-decoration: none;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
  }
  
  .nav-links li a:hover,
  .nav-links li a.active {
    color: #e63946;
    text-shadow: 0 0 8px rgba(230, 57, 70, 0.5);
  }
  
  .hamburger {
    position: absolute !important;
    right: 5% !important;
    top: 50% !important;
    transform: translateY(-50%) !important;
    font-size: 2.4rem !important;
    cursor: pointer;
    background: none;
    border: none;
    color: #f5f0eb;
    display: none;
    z-index: 101;
  }
  
  /* Sidebar styles */
  .sidebar {
    position: fixed;
    top: 0;
    right: -100%;
    width: 280px;
    height: 100vh;
    background: rgba(0, 0, 0, 0.95);
    backdrop-filter: blur(16px);
    z-index: 1000;
    transition: right 0.3s ease;
    padding: 6rem 2rem 2rem;
    box-shadow: -5px 0 25px rgba(0, 0, 0, 0.5);
  }
  
  .sidebar.active {
    right: 0;
  }
  
  .sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }
  
  .sidebar ul li a {
    font-size: 1.75rem !important;
    font-family: 'Raleway', sans-serif;
    font-weight: 500;
    color: #f5f0eb;
    text-decoration: none;
    display: block;
    padding: 0.8rem 0 !important;
    transition: all 0.3s ease;
  }
  
  .sidebar ul li a:hover,
  .sidebar ul li a.active {
    color: #e63946;
    padding-left: 1rem;
  }
  
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    z-index: 999;
    display: none;
  }
  
  .overlay.active {
    display: block;
  }
  
  /* Mobile responsive */
  @media (max-width: 768px) {
    .navbar {
      padding: 2.2rem 5% !important;
    }
    
    .nav-links {
      display: none;
    }
    
    .hamburger {
      display: block !important;
    }
  }
  
  /* Desktop: hide hamburger */
  @media (min-width: 769px) {
    .hamburger {
      display: none !important;
    }
  }
</style>

<header>
  <nav class="navbar glass">
    <ul class="nav-links">
      <li><a href="index.html" data-page="index">Home</a></li>
      <li><a href="AboutUs.html" data-page="AboutUs">About Us</a></li>
      <li><a href="projects.html" data-page="projects">Projects</a></li>
      <li><a href="guests.html" data-page="guests">Guests</a></li>
      <li><a href="shop.html" data-page="shop">Shop</a></li>
      <li><a href="contact.html" data-page="contact">Contact Us</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <i class="fa fa-bars"></i>
    </button>
  </nav>
  <div class="sidebar" id="sidebar">
    <ul>
      <li><a href="index.html" data-page="index">Home</a></li>
      <li><a href="AboutUs.html" data-page="AboutUs">About Us</a></li>
      <li><a href="projects.html" data-page="projects">Projects</a></li>
      <li><a href="guests.html" data-page="guests">Guests</a></li>
      <li><a href="shop.html" data-page="shop">Shop</a></li>
      <li><a href="contact.html" data-page="contact">Contact Us</a></li>
    </ul>
  </div>
  <div class="overlay" id="overlay"></div>
</header>

<script>
  // Navigation bar interaction script
  (function() {
    function initNavbar() {
      const hamburger = document.getElementById('hamburger');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const menuSound = new Audio('menu.mp3');
      const navSound = new Audio('nav.mp3');
      
      if (hamburger && sidebar && overlay) {
        hamburger.addEventListener('click', () => { 
          sidebar.classList.toggle('active'); 
          overlay.classList.toggle('active'); 
          menuSound.currentTime = 0; 
          menuSound.play().catch(() => {}); 
        });
        
        overlay.addEventListener('click', () => { 
          sidebar.classList.remove('active'); 
          overlay.classList.remove('active'); 
        });
      }
      
      // Set active class based on current page
      const currentPage = window.location.pathname.split('/').pop();
      document.querySelectorAll('.nav-links a, .sidebar a').forEach(link => {
        const linkPage = link.getAttribute('href');
        if (linkPage === currentPage) {
          link.classList.add('active');
        }
        
        link.addEventListener('click', (e) => { 
          e.preventDefault(); 
          navSound.currentTime = 0; 
          navSound.play().catch(() => {}); 
          setTimeout(() => { 
            window.location.href = link.getAttribute('href'); 
          }, 150); 
        }); 
      });
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initNavbar);
    } else {
      initNavbar();
    }
  })();
</script>
